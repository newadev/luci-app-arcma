name: Build and Release IPK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_ipk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Setup OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.3/targets/x86/64"
          SDK_FILE=$(curl -sL $SDK_URL/sha256sums | grep "openwrt-sdk" | awk '{print $2}' | sed 's/*//g')
          wget $SDK_URL/$SDK_FILE
          tar -xf $SDK_FILE
          mv openwrt-sdk-* sdk
          
      - name: Prepare feeds and package
        run: |
          cd sdk
          # Copy package source from our repo layout
          mkdir -p package/luci-app-arcma
          cp -r ../source/luci-app-arcma/* package/luci-app-arcma/
          
          # Initialize feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          
      - name: Build Package
        run: |
          cd sdk
          make package/luci-app-arcma/compile V=s
          # Move compiled ipk to source directory for artifact upload
          find bin/ -name "*.ipk" -exec cp {} ../source/ \;
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-arcma-ipk
          path: source/*.ipk
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: source/*.ipk
